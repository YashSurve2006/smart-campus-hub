services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-campus_root}
      MYSQL_DATABASE: ${DB_NAME:-smart_campus}
      MYSQL_USER: ${DB_USER:-campus}
      MYSQL_PASSWORD: ${DB_PASSWORD:-campus_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/smart_campus.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      TRUST_PROXY: "1"
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-campus}
      DB_PASSWORD: ${DB_PASSWORD:-campus_pass}
      DB_NAME: ${DB_NAME:-smart_campus}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-in-production}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    ports:
      - "${API_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: ""
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  mysql_data:
  api_uploads:
