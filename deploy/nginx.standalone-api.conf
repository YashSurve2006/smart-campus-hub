# Example: nginx terminates TLS and proxies only the API (PM2 Node on 127.0.0.1:5000)
server {
    listen 443 ssl http2;
    server_name api.campus.example.edu;

    ssl_certificate     /etc/letsencrypt/live/api.campus.example.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.campus.example.edu/privkey.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
